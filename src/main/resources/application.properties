server.port=8080

# Database Configuration (Thay đổi username/password theo cấu hình máy của bạn)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CoffeeChain;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate Configuration
# Lưu ý: Vì DB đã có cấu trúc, tuyệt đối để ddl-auto=none để không vô tình sửa/xóa các bảng
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JWT Secret Key (Dùng để mã hóa Token - Phải để trong env ngoài thực tế)
jwt.secret=ThisIsASecretKeyForJWTTokenCoffeeChainProjectDoNotShareItPublicly
jwt.expiration=86400000
